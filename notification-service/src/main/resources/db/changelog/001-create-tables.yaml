databaseChangeLog:
    - changeSet:
        id: 1
        author: giacomo
        preconditions:
          - dbms:
              type: mysql
        changes:
            - createTable:
                tableName: messages
                columns:
                  - column:
                      name: id
                      type: BIGINT
                      autoIncrement: true
                      constraints:
                          primaryKey: true
                  - column:
                        name: message_text
                        type: VARCHAR(255)
                        constraints:
                            nullable: false
                  - column:
                      name: sended_at
                      type: TIMESTAMP
                      defaultValueComputed: CURRENT_TIMESTAMP
                      constraints:
                        nullable: false

