spring.application.name=inventory-service
server.error.include-message=always
server.error.include-binding-errors=always

server.port=8081

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

#Eureka server
eureka.client.serviceUrl.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}
eureka.client.serviceUrl.instance.preferIpAddress=true

#Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

#DB connection
spring.datasource.url=jdbc:mysql://mysql:3306/esercizio_inventory
spring.datasource.username=inventoryservice_user
spring.datasource.password=${INVENTORY_DB_PASS}

#DB props
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.generate_statistics = true

#Redis
spring.data.redis.host=redis
spring.data.redis.port=6379