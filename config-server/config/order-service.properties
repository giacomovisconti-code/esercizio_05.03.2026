spring.application.name=order-service
server.port=8083
server.error.include-message=always
server.error.include-binding-errors=always

#Eureka Server
eureka.client.serviceUrl.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}
eureka.client.serviceUrl.instance.preferIpAddress=true

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

#Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

#DB connection
spring.datasource.url=jdbc:mysql://mysql:3306/esercizio_orders
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

#DB props
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.generate_statistics = true

#OpenFeign
feign.httpclient.enabled=true
spring.cloud.openfeign.httpclient.enabled=true

#Kafka
spring.kafka.bootstrap-servers=kafka:9092
#spring.kafka.consumer.group-id=message-consumer-group
#spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

kafka.topic.send.message=send-confirm-message

#Redis
spring.data.redis.host=redis
spring.data.redis.port=6379