spring.application.name=notification-service

server.port=8082

#Eureka Server
eureka.client.serviceUrl.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}
eureka.client.serviceUrl.instance.preferIpAddress=true

#Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

#Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=message-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer


kafka.topic.send.message=send-confirm-message

#Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

#Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

spring.datasource.url=jdbc:mysql://localhost:3306/esercizio_notifications
spring.datasource.username=root
spring.datasource.password=root1234